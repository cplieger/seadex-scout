# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). seadex-scout has no HTTP surface, so this is a
# health-gated test: it waits for the container HEALTHCHECK (the distroless
# `seadex-scout health` file-marker probe, /tmp/.healthy) to report "healthy" -
# proving the binary runs in the distroless base, loads + validates its config,
# and the health subcommand works. Runs resident-idle (poll_interval: off in the
# fixture config): main() sets the marker healthy on boot and idles WITHOUT a
# cycle, so no Sonarr/Radarr/SeaDex/AniList contact is needed (the startup
# pingArrs is non-fatal). A committed fixture config is bind-mounted at /config
# because seadex-scout writes a starter + exits when /config/config.yaml is
# absent, and config validation requires one arr enabled with a url + api_key.
SMOKE_APP_NAME=seadex-scout
# HEALTHCHECK start-period 15s / interval 30s; 90 covers it plus a couple intervals.
SMOKE_TIMEOUT=90
SMOKE_RUN_ARGS="-v ${SMOKE_DIR}/fixtures:/config:ro"
