# seadex-scout config.

# ----------------------------------------------------------------------------
# Connections & schedule
# ----------------------------------------------------------------------------
# At least one arr must be enabled with a url + api_key.
sonarr:
  enabled: true
  url: "http://sonarr:8989" # where seadex-scout reaches Sonarr (internal is fine)
  api_key: "" # required when enabled
  public_url: "" # browser base for the report's deep-links; empty = use url
radarr:
  enabled: false
  url: "http://radarr:7878"
  api_key: ""
  public_url: ""

mode: "daemon" # daemon (scheduled) | report (one-shot, exit)
poll_interval: "12h" # also runs on start; off/disabled/0 = external `poll` trigger

log:
  level: "info" # debug | info | warn | error
  format: "json" # json | text

# ----------------------------------------------------------------------------
# Report / alert engine — shapes the findings + report, NOT the indexer
# ----------------------------------------------------------------------------
animebytes: false # true if you have an AnimeBytes account (adds AB releases + links)

filters:
  exclude_remux: false # true drops remuxes (default keeps them)
  require_dual_audio: false # true drops non-dual-audio releases
  exclude_specials: false # true drops OVA/ONA/specials

arr_tags:
  include: [] # scan only items with one of these tags; [] = all
  exclude: [] # skip items with any of these tags (wins over include)

report:
  dir: "/config/reports" # report-<UTC date+time>.md + .json written here

# ----------------------------------------------------------------------------
# Indexer engine — optional Torznab feed; the arrs filter it (profiles + CFs)
# ----------------------------------------------------------------------------
# Served by the daemon whenever a Torznab URL is set (both empty = off, no port).
indexer:
  feed_api_key: "" # the arrs send this, the feed checks it (openssl rand -hex 16)
  nyaa_torznab_url: "" # Prowlarr Nyaa Torznab URL, e.g. http://prowlarr:9696/1/api ("" = off)
  ab_torznab_url: "" # Prowlarr AnimeBytes Torznab URL ("" = off)
  prowlarr_api_key: "" # Prowlarr API key; secret, never logged
  ab_passkey: "" # AnimeBytes passkey for the AB RSS feed download links ("" = AB RSS off; Nyaa needs none)
