# Example compose for seadex-scout. See the README for all configuration options and hardening.
services:
  seadex-scout:
    image: ghcr.io/cplieger/seadex-scout:latest
    container_name: seadex-scout
    restart: unless-stopped
    user: "1000:1000"  # match your host user (owns ./config)

    # See README "Configuration"; config.yaml expands these .env-backed secret variables.
    environment:
      SONARR_API_KEY: "${SONARR_API_KEY:-}"
      RADARR_API_KEY: "${RADARR_API_KEY:-}"
      SEADEX_SCOUT_PROWLARR_KEY: "${SEADEX_SCOUT_PROWLARR_KEY:-}"
      SEADEX_SCOUT_AB_PASSKEY: "${SEADEX_SCOUT_AB_PASSKEY:-}"
    volumes:
      - "./config:/config"  # holds config.yaml, state, and the reports dir
